version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: salonsflow-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-salonsflowpassword123}
      POSTGRES_DB: ${DB_NAME:-salonsflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - salonsflow-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: salonsflow-backend
    restart: always
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-salonsflowpassword123}@postgres-db:5432/${DB_NAME:-salonsflow}?schema=public
      PORT: 3001
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET}
      MISSED_CALL_SECRET: ${MISSED_CALL_SECRET}
    depends_on:
      - postgres-db
    networks:
      - salonsflow-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    container_name: salonsflow-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
    networks:
      - salonsflow-net

volumes:
  postgres_data:

networks:
  salonsflow-net:
    driver: bridge
